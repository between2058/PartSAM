version: "3.8"

# =============================================================================
# PartSAM FastAPI Microservice — Docker Compose
#
# Quick start:
#   cp .env.example .env
#   vim .env
#   docker compose up -d
#
# Rebuild after code changes:
#   docker compose up -d --build
#
# Logs:
#   docker compose logs -f partsam
#
# GPU check:
#   docker compose exec partsam nvidia-smi
# =============================================================================

services:
  partsam:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TORCH_CUDA_ARCH_LIST: "${TORCH_CUDA_ARCH_LIST:-12.0}"
        MAX_JOBS: "${MAX_JOBS:-4}"
        http_proxy: "${HTTP_PROXY:-}"
        https_proxy: "${HTTPS_PROXY:-}"
        no_proxy: "localhost,127.0.0.1"

    image: partsam:latest
    container_name: partsam-api

    ports:
      - "${PARTSAM_PORT:-8000}:8000"

    volumes:
      # Persist logs
      - ./logs:/app/logs

      # Persist results
      - ${PARTSAM_RESULTS_PATH:-./results}:/app/results:rw

    environment:
      - PARTSAM_CKPT_PATH=/app/pretrained/model.safetensors
      - PARTSAM_DEVICE=${PARTSAM_DEVICE:-cuda:0}
      - PARTSAM_MAX_CONCURRENT=${PARTSAM_MAX_CONCURRENT:-1}
      - PARTSAM_SEMAPHORE_TIMEOUT=${PARTSAM_SEMAPHORE_TIMEOUT:-300}
      - PARTSAM_MAX_FACES=${PARTSAM_MAX_FACES:-200000}
      - PARTSAM_BATCH_SIZE=${PARTSAM_BATCH_SIZE:-32}

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${GPU_ID:-0}"]
              capabilities: [gpu]

    shm_size: "8gb"

    restart: unless-stopped
